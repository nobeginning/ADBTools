name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ "*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :adb-lib:assembleRelease
      - run: ./gradlew :adb-lib:test

      # Upload AAR as build artifact
      - uses: actions/upload-artifact@v4
        with:
          name: adb-lib-aar
          path: adb-lib/build/outputs/aar/*.aar

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: adb-lib-aar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.aar"
          generate_release_notes: true
